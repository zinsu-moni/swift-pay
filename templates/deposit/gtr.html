<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deposit Payment - SWIFTPAY</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/loader.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gtr-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #FFFFFF 0%, #F5F1E8 100%);
            padding: 20px;
        }

        .gtr-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 500px;
            margin: 0 auto;
            overflow: hidden;
        }

        .gtr-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            font-size: 24px;
            text-decoration: none;
        }

        .gtr-logo {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
        }

        .gtr-content {
            padding: 40px 30px;
        }

        .balance-display {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            margin-bottom: 30px;
        }

        .balance-label {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 28px;
            font-weight: bold;
            color: #2c3e50;
        }

        .amount-input-group {
            margin-bottom: 30px;
        }

        .amount-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            transition: all 0.3s ease;
        }

        .amount-input:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.1);
        }

        .quick-amounts {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 30px;
        }

        .quick-amount {
            padding: 12px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .quick-amount:hover {
            border-color: #4facfe;
            background: #f8f9ff;
        }

        .quick-amount.selected {
            border-color: #4facfe;
            background: #4facfe;
            color: white;
        }

        .gtr-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
        }

        .gtr-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3);
        }

        .gtr-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .payment-info {
            background: #e8f4fd;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
        }

        .payment-info h4 {
            color: #2c3e50;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
        }

        .info-item:last-child {
            border-bottom: none;
        }

        .security-note {
            text-align: center;
            color: #6c757d;
            font-size: 14px;
            margin-top: 20px;
        }

        /* old inline loader removed; using global loader */

        @media (max-width: 768px) {
            .gtr-container {
                padding: 10px;
            }

            .gtr-content {
                padding: 30px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="gtr-container">
        <div class="gtr-card">
            <!-- Header -->
            <div class="gtr-header">
                <a href="{{ url_for('dashboard') }}" class="back-btn" data-loader data-loader-text="Loading..."
                    data-loader-subtitle="Returning to dashboard">
                    <i class="fas fa-arrow-left"></i>
                </a>
                <div class="gtr-logo">
                    <i class="fas fa-credit-card"></i>
                </div>
                <h2>Deposit Payment</h2>
                <p>Fast, secure payment processing</p>
            </div>

            <!-- Content -->
            <div class="gtr-content">
                <!-- Current Balance -->
                <div class="balance-display">
                    <div class="balance-label">Current Balance</div>
                    <div class="balance-amount">₦{{ "{:,.0f}".format(user.recharge_balance) }}</div>
                </div>

                <!-- Amount Input -->
                <div class="amount-input-group">
                    <label for="amount" style="display: block; margin-bottom: 10px; color: #2c3e50; font-weight: bold;">
                        <i class="fas fa-naira-sign"></i> Enter Amount
                    </label>
                    <input type="number" id="amount" class="amount-input" placeholder="{{ "{:,.0f}".format(minimum_deposit|default(3000)) }}" min="{{ minimum_deposit|default(3000)|int }}" step="50"
                        oninput="updatePaymentInfo()">
                </div>

                <!-- Quick Amount Selection -->
                <div class="quick-amounts">
                    <div class="quick-amount" onclick="selectAmount(3000)">₦3,000</div>
                    <div class="quick-amount" onclick="selectAmount(5000)">₦5,000</div>
                    <div class="quick-amount" onclick="selectAmount(7000)">₦7,000</div>
                    <div class="quick-amount" onclick="selectAmount(8000)">₦8,000</div>
                    <div class="quick-amount" onclick="selectAmount(9000)">₦9,000</div>
                    <div class="quick-amount" onclick="selectAmount(10000)">₦10,000</div>
                </div>

                <!-- Payment Button -->
                <button class="gtr-btn" id="payBtn" onclick="processPayment()" disabled>
                    <i class="fas fa-lock"></i> Continue to Payment
                </button>

                <!-- Global loader handles processing state -->

                <!-- Payment Information -->
                <div class="payment-info" id="paymentInfo" style="display: none;">
                    <h4><i class="fas fa-info-circle"></i> Payment Details</h4>
                    <div class="info-item">
                        <span>Amount:</span>
                        <span id="payAmount">₦0</span>
                    </div>
                    <div class="info-item">
                        <span>Processing Fee:</span>
                        <span id="payFee">₦0</span>
                    </div>
                    <div class="info-item">
                        <span><strong>Total:</strong></span>
                        <span id="payTotal"><strong>₦0</strong></span>
                    </div>
                </div>

                <!-- Security Note -->
                <div class="security-note">
                    <i class="fas fa-shield-alt"></i>
                    Your payment is secured with 256-bit SSL encryption
                </div>

            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/loader.js') }}"></script>
    <script>
        const minimumDeposit = {{ minimum_deposit|default(3000)|int }};
        const maximumDeposit = {{ maximum_deposit|default(10000)|int }};

        function selectAmount(amount) {
            if (maximumDeposit && amount > maximumDeposit) {
                showToast(`Maximum automatic deposit is ₦${maximumDeposit.toLocaleString()}`, 'warning');
                return;
            }

            // Remove selection from all buttons
            document.querySelectorAll('.quick-amount').forEach(btn => {
                btn.classList.remove('selected');
            });

            // Select clicked button
            event.target.classList.add('selected');

            // Set amount in input
            document.getElementById('amount').value = amount;

            // Update payment info
            updatePaymentInfo();
        }

        function updatePaymentInfo() {
            const amount = parseFloat(document.getElementById('amount').value) || 0;
            const minAmount = minimumDeposit;
            const maxAmount = maximumDeposit;

            if (amount >= minAmount && (!maxAmount || amount <= maxAmount)) {
                document.getElementById('payBtn').disabled = false;
                document.getElementById('paymentInfo').style.display = 'block';

                const fee = 0;
                const total = amount;

                // Update display
                document.getElementById('payAmount').textContent = `₦${amount.toLocaleString()}`;
                document.getElementById('payFee').textContent = `₦${fee.toLocaleString()}`;
                document.getElementById('payTotal').textContent = `₦${total.toLocaleString()}`;
            } else {
                document.getElementById('payBtn').disabled = true;
                document.getElementById('paymentInfo').style.display = 'none';
            }
        }

        function processPayment() {
            const amount = parseFloat(document.getElementById('amount').value);

            if (!amount || amount < minimumDeposit) {
                showToast(`Please enter a valid amount (minimum ₦${minimumDeposit.toLocaleString()})`, 'warning');
                return;
            }

            if (maximumDeposit && amount > maximumDeposit) {
                showToast(`Please enter a valid amount (maximum ₦${maximumDeposit.toLocaleString()})`, 'warning');
                return;
            }

            // Show global loader
            showLoader('Processing payment...', 'Creating payment request');
            const payBtn = document.getElementById('payBtn');
            payBtn.disabled = true;

            // Confirm before creating the payment request
            setTimeout(() => {
                // For now, redirect to a success page or show success message
                // In real implementation, this would integrate with the payment API

                const total = amount;

                // Use custom inline confirm modal instead of browser confirm
                showGtrConfirm(`Proceed with payment of ₦${total.toLocaleString()}?`, {
                    title: 'Confirm Payment',
                    confirmText: 'Continue',
                    cancelText: 'Cancel'
                }).then(ok => {
                    if (ok) {
                        processDeposit(amount);
                    } else {
                        hideLoader();
                        payBtn.disabled = false;
                    }
                });
            }, 1000);
        }

        function processDeposit(amount) {
            // Submit to backend
            const formData = new FormData();
            formData.append('amount', amount);
            formData.append('payment_method', 'nekpayment');

            fetch('/process_deposit', {
                method: 'POST',
                body: formData
            })
                .then(response => response.json())
                .then(data => {
                    // Decide based on backend response
                    if (data.success) {
                        if (data.payment_url) {
                            showLoader('Opening payment page...', 'Complete the payment in the current tab');

                            setTimeout(() => {
                                window.location.href = data.payment_url;
                            }, 250);

                            hideLoader();
                            showToast('Payment opened in the current tab. Finish payment there and return to the site once complete.', 'success');
                        } else {
                            // Fallback - should not happen in normal flow
                            showLoaderSuccess('Deposit successful!', `₦${amount.toLocaleString()} added to your account`);
                            setTimeout(() => { window.location.href = '/dashboard'; }, 900);
                        }
                    } else {
                        hideLoader();
                        showToast('Payment creation failed: ' + (data.message || 'Unknown error'), 'danger');
                        document.getElementById('payBtn').disabled = false;
                    }
                })
                .catch(error => {
                    hideLoader();
                    showToast('Network error occurred. Please try again.', 'danger');
                    document.getElementById('payBtn').disabled = false;
                });
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', function () {
            updatePaymentInfo();
        });
    </script>
    <style>
        /* Inline minimal confirm modal for this page */
        .gtr-confirm-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            z-index: 40000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .gtr-confirm {
            width: min(92vw, 460px);
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            border-left: 5px solid #D4AF37;
        }

        .gtr-confirm-header {
            padding: 14px 16px 6px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .gtr-confirm-title {
            font-size: 16px;
            font-weight: 800;
            color: #0f172a;
            margin: 0;
        }

        .gtr-confirm-body {
            padding: 0 16px 6px 16px;
            color: #0f172a;
            font-size: 14px;
        }

        .gtr-confirm-actions {
            padding: 12px 16px 16px 16px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .gtr-btn {
            appearance: none;
            border: 0;
            border-radius: 10px;
            padding: 10px 14px;
            font-weight: 700;
            cursor: pointer;
            font-size: 14px;
        }

        .gtr-btn.cancel {
            background: #e5e7eb;
            color: #111827;
        }

        .gtr-btn.primary {
            background: #D4AF37;
            color: #fff;
        }
    </style>
    <div id="gtrConfirm" class="gtr-confirm-backdrop" role="dialog" aria-modal="true" aria-hidden="true">
        <div class="gtr-confirm">
            <div class="gtr-confirm-header">
                <i class="fas fa-info-circle" style="color:#D4AF37"></i>
                <h3 class="gtr-confirm-title" id="gtrConfirmTitle">Confirm</h3>
            </div>
            <div class="gtr-confirm-body" id="gtrConfirmMessage">Message</div>
            <div class="gtr-confirm-actions">
                <button type="button" class="gtr-btn cancel" id="gtrCancelBtn">Cancel</button>
                <button type="button" class="gtr-btn primary" id="gtrOkBtn">OK</button>
            </div>
        </div>
    </div>
    <script>
        function showGtrConfirm(message, opts = {}) {
            const { title = 'Please confirm', confirmText = 'OK', cancelText = 'Cancel' } = opts;
            return new Promise(resolve => {
                const backdrop = document.getElementById('gtrConfirm');
                const titleEl = document.getElementById('gtrConfirmTitle');
                const msgEl = document.getElementById('gtrConfirmMessage');
                const okBtn = document.getElementById('gtrOkBtn');
                const cancelBtn = document.getElementById('gtrCancelBtn');

                titleEl.textContent = title;
                msgEl.textContent = message;
                okBtn.textContent = confirmText;
                cancelBtn.textContent = cancelText;

                function cleanup(val) {
                    backdrop.style.display = 'none';
                    backdrop.setAttribute('aria-hidden', 'true');
                    document.removeEventListener('keydown', onKey);
                    backdrop.removeEventListener('click', onBackdrop);
                    okBtn.removeEventListener('click', onOk);
                    cancelBtn.removeEventListener('click', onCancel);
                    resolve(val);
                }
                function onOk() { cleanup(true); }
                function onCancel() { cleanup(false); }
                function onBackdrop(e) { if (e.target === backdrop) cleanup(false); }
                function onKey(e) { if (e.key === 'Escape') cleanup(false); if (e.key === 'Enter') cleanup(true); }

                okBtn.addEventListener('click', onOk);
                cancelBtn.addEventListener('click', onCancel);
                backdrop.addEventListener('click', onBackdrop);
                document.addEventListener('keydown', onKey);

                backdrop.style.display = 'flex';
                backdrop.setAttribute('aria-hidden', 'false');
                setTimeout(() => okBtn.focus(), 0);
            });
        }
    </script>    
    <!-- Vercel Web Analytics -->
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>

</body>

</html>
