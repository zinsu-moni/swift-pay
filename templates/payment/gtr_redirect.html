<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting to GTR Bank...</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            margin: 0;
        }
        .redirect-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .redirect-icon {
            font-size: 60px;
            color: #007bff;
            margin-bottom: 24px;
        }
        .redirect-title {
            font-size: 24px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 12px;
        }
        .redirect-text {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .payment-details {
            background: linear-gradient(135deg, #f1f5f9 0%, #e0f2fe 100%);
            border-radius: 12px;
            padding: 20px;
            text-align: left;
            margin-bottom: 24px;
        }
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
        }
        .detail-label {
            color: #64748b;
            font-weight: 600;
            font-size: 14px;
        }
        .detail-value {
            color: #0f172a;
            font-weight: 800;
            font-size: 14px;
        }
        .manual-link-container {
            display: none;
            margin-top: 24px;
        }
        .manual-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
        }
        .btn-primary {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            background: linear-gradient(135deg, #007bff 0%, #0056b3 100%);
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            margin-top: 12px;
        }
        .redirect-error {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(148, 163, 184, 0.2);
        }
        .redirect-error p {
            color: #dc2626;
            font-weight: 700;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="redirect-card">
        <div class="redirect-icon">
            <i class="fas fa-arrow-right-arrow-left"></i>
        </div>
        <h2 class="redirect-title">Redirecting to GTR Bank</h2>
        <p class="redirect-text">Please wait while we redirect you to the secure payment gateway...</p>
        <div class="payment-details">
            <div class="detail-item">
                <span class="detail-label">Reference:</span>
                <span class="detail-value">{{ reference }}</span>
            </div>
            <div class="detail-item">
                <span class="detail-label">Amount:</span>
                <span class="detail-value">₦{{ amount | format_number }}</span>
            </div>
        </div>
        <div class="manual-link-container" id="manual-link-container">
            <a href="{{ payment_url }}" class="manual-link" target="_blank">
                <i class="fas fa-external-link-alt"></i>
                Click here if not redirected automatically
            </a>
        </div>
        <div class="redirect-error" id="redirect-error" style="display: none;">
            <p>Automatic redirect failed.</p>
            <a href="{{ payment_url }}" class="btn-primary" target="_blank">Continue to Payment</a>
        </div>
    </div>
    <script>
        // Auto-redirect to payment URL
        setTimeout(function() {
            window.location.href = '{{ payment_url }}';
        }, 3000);
        
        // Show manual link after 8 seconds
        setTimeout(function() {
            document.getElementById('manual-link-container').style.display = 'block';
        }, 8000);
        
        // Fallback: If still on page after 15 seconds, show error
        setTimeout(function() {
            if (document.visibilityState === 'visible') {
                document.getElementById('redirect-error').style.display = 'block';
            }
        }, 15000);
    </script>
    <!-- Vercel Web Analytics -->
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
</body>
</html>
